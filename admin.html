<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — RR Celulares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.icon-sprite { position: absolute; width: 0; height: 0; overflow: hidden; }
.icon { display: inline-block; vertical-align: middle; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.icon-sm { width: 16px; height: 16px; }
.icon-md { width: 20px; height: 20px; }
.icon-lg { width: 24px; height: 24px; }
.icon-whatsapp { fill: #fff; stroke: none; }

body {
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: #e0e0e0;
  padding: 0;
}

.admin-header {
  background: #1a0000;
  border-bottom: 1px solid #333;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.admin-header h1 {
  font-size: 1.2rem;
  font-weight: 700;
  color: #ff4444;
  display: flex;
  align-items: center;
  gap: 10px;
}

.admin-header h1 small {
  font-weight: 400;
  font-size: 0.7rem;
  color: #666;
}

.header-actions { display: flex; gap: 8px; }

.header-actions .btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 0.8rem;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #fff;
}

.btn-view { background: #333; }
.btn-view:hover { background: #444; }
.btn-save { background: #25D366; }
.btn-save:hover { opacity: 0.9; }
.btn-reset { background: #CC0000; }
.btn-reset:hover { opacity: 0.9; }

.container { max-width: 1000px; margin: 0 auto; padding: 24px; }

.section-card {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  margin-bottom: 24px;
  overflow: hidden;
}

.section-card h2 {
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  padding: 16px 20px;
  background: #222;
  border-bottom: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.section-card h2 .icon { color: #CC0000; flex-shrink: 0; }

.section-card h2 .badge {
  font-size: 0.7rem;
  background: #333;
  color: #999;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 400;
  margin-left: auto;
}

.section-body { padding: 20px; }

.form-grid { display: grid; gap: 16px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

input, textarea, select {
  width: 100%;
  padding: 10px 12px;
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 0.85rem;
  font-family: 'Inter', sans-serif;
}

input:focus, textarea:focus { outline: none; border-color: #CC0000; }

textarea { resize: vertical; min-height: 60px; }

.field { margin-bottom: 12px; }

.item-card {
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}

.item-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.item-card-header .title {
  font-weight: 600;
  font-size: 0.9rem;
  color: #ccc;
}

.item-card-header .actions { display: flex; gap: 6px; }

.btn-icon {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-icon:hover { opacity: 0.8; }

.btn-icon .icon { stroke-width: 2; }

.btn-icon.delete { background: rgba(204,0,0,0.2); }
.btn-icon.delete .icon { color: #ff4444; }
.btn-icon.move { background: #222; }
.btn-icon.move .icon { color: #999; }

.btn-add {
  width: 100%;
  padding: 12px;
  background: #222;
  border: 1px dashed #444;
  border-radius: 8px;
  color: #999;
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  margin-top: 8px;
}

.btn-add:hover { border-color: #CC0000; color: #CC0000; background: #1a0000; }

.specs-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }

.spec-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  background: #222;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.8rem;
}

.spec-tag .remove-spec {
  cursor: pointer;
  color: #ff4444;
  font-weight: 700;
  margin-left: 4px;
}

.img-upload {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.img-upload input[type="file"] { display: none; }

.img-upload .upload-btn {
  padding: 8px 16px;
  background: #222;
  border: 1px solid #333;
  border-radius: 6px;
  color: #ccc;
  cursor: pointer;
  font-size: 0.8rem;
}

.img-upload .upload-btn:hover { border-color: #CC0000; }

.img-preview {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0d0d;
}

.img-preview img { width: 100%; height: 100%; object-fit: cover; }

.img-preview .no-img { color: #555; font-size: 0.7rem; }

.img-remove {
  font-size: 0.75rem;
  color: #ff4444;
  cursor: pointer;
  text-decoration: underline;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 14px 24px;
  border-radius: 10px;
  color: #fff;
  font-weight: 600;
  font-size: 0.9rem;
  z-index: 999;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
}

.toast.show { transform: translateY(0); opacity: 1; }

.toast.success { background: #25D366; }
.toast.error { background: #CC0000; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: #555;
  font-size: 0.9rem;
}

/* ===== LOGIN SCREEN ===== */
.login-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 9999;
  background: linear-gradient(135deg, #1A0000, #3D0000, #2A0000);
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 16px;
  padding: 48px 40px 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}

.login-box .logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #CC0000, #FF1A1A);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 24px;
  color: #fff;
  margin: 0 auto 16px;
}

.login-box h2 {
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}

.login-box p {
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 28px;
}

.login-box .field {
  text-align: left;
  margin-bottom: 16px;
}

.login-box .field label {
  color: #888;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.login-box .field input {
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px 14px;
  color: #e0e0e0;
  font-size: 0.9rem;
  width: 100%;
}

.login-box .field input:focus { border-color: #CC0000; outline: none; }

.login-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #CC0000, #FF1A1A);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  margin-top: 8px;
}

.login-btn:hover { opacity: 0.9; }

.login-error {
  color: #ff4444;
  font-size: 0.8rem;
  margin-top: 12px;
  display: none;
}

.login-error.show { display: block; }

.login-box .lock-icon {
  width: 48px;
  height: 48px;
  color: #CC0000;
  margin: 0 auto 16px;
}
</style>
</head>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-overlay" id="loginScreen">
  <div class="login-box">
    <div class="logo-icon">RR</div>
    <svg class="icon lock-icon"><use href="#icon-lock"/></svg>
    <h2>Acesso Restrito</h2>
    <p>Painel administrativo RR Celulares</p>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="Digite o usuário" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuário ou senha incorretos</div>
  </div>
</div>

<div class="admin-header">
  <h1>
    <svg class="icon icon-lg" style="color:#ff4444;"><use href="#icon-gear"/></svg>
    Painel Admin <small>RR Celulares</small>
  </h1>
  <div class="header-actions">
    <a href="index.html" target="_blank" class="btn btn-view">
      <svg class="icon icon-sm" style="color:#fff;"><use href="#icon-phone"/></svg> Ver site
    </a>
    <button class="btn btn-view" onclick="doLogout()" style="background:#555;">
      <svg class="icon icon-sm" style="color:#fff;"><use href="#icon-log-out"/></svg> Sair
    </button>
    <button class="btn btn-save" onclick="saveAll()">
      <svg class="icon icon-sm" style="fill:none;stroke:#fff;"><use href="#icon-check"/></svg> Salvar tudo
    </button>
    <button class="btn btn-reset" onclick="resetAll()">
      <svg class="icon icon-sm" style="fill:none;stroke:#fff;"><use href="#icon-x"/></svg> Reset
    </button>
  </div>
</div>

<div class="container" id="app"></div>

<div id="toast" class="toast"></div>

var data = {};

function loadData() {
  try {
    var saved = localStorage.getItem('rr_data');
    if (saved) {
      data = JSON.parse(saved);
      for (var key in DEFAULT_DATA) {
        if (!data[key]) data[key] = JSON.parse(JSON.stringify(DEFAULT_DATA[key]));
      }
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem('rr_data', JSON.stringify(data));
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._hide);
  t._hide = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function saveAll() {
  saveData();
  showToast('Dados salvos com sucesso!', 'success');
}

function resetAll() {
  if (!confirm('Tem certeza? Isso vai apagar todas as alterações e restaurar os dados padrão.')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData();
  render();
  showToast('Dados restaurados ao padrão', 'error');
}

function iconSvg(name, cls) {
  return '<svg class="icon ' + (cls || 'icon-sm') + '"><use href="#icon-' + name + '"/></svg>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// === SERVICES ===
function addService() {
  data.services.push({ icon: 'phone', name: 'Novo Serviço', desc: 'Descrição do serviço', price: 'R$ 0' });
  render();
}

function removeService(i) {
  data.services.splice(i, 1);
  render();
}

function moveService(i, dir) {
  var t = data.services[i + dir];
  if (!t) return;
  data.services[i + dir] = data.services[i];
  data.services[i] = t;
  render();
}

// === SCOOTERS ===
function addScooter() {
  data.scooters.push({ name: 'Nova Scooter', tag: '', specs: ['bolt'], specLabels: ['500W'], desc: 'Descrição', price: 'R$ 0', image: '', bg: 'linear-gradient(135deg, #1a1a1a, #333)' });
  render();
}

function removeScooter(i) {
  data.scooters.splice(i, 1);
  render();
}

function moveScooter(i, dir) {
  var t = data.scooters[i + dir];
  if (!t) return;
  data.scooters[i + dir] = data.scooters[i];
  data.scooters[i] = t;
  render();
}

function addSpec(scooterIdx) {
  var label = prompt('Texto do spec (ex: 500W):');
  if (label) {
    data.scooters[scooterIdx].specLabels.push(label);
    if (!data.scooters[scooterIdx].specs) data.scooters[scooterIdx].specs = [];
    data.scooters[scooterIdx].specs.push('bolt');
    render();
  }
}

function removeSpec(scooterIdx, specIdx) {
  data.scooters[scooterIdx].specs.splice(specIdx, 1);
  data.scooters[scooterIdx].specLabels.splice(specIdx, 1);
  render();
}

function handleImageUpload(scooterIdx, file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    data.scooters[scooterIdx].image = e.target.result;
    render();
  };
  reader.readAsDataURL(file);
}

function removeImage(scooterIdx) {
  data.scooters[scooterIdx].image = '';
  render();
}

// === FEEDBACKS ===
function addFeedback() {
  data.feedbacks.push({ name: 'Cliente', initials: 'CL', text: '"Ótimo serviço!"' });
  render();
}

function removeFeedback(i) {
  data.feedbacks.splice(i, 1);
  render();
}

// === HERO LIST ===
function addHeroItem() {
  var item = prompt('Item da lista do hero (ex: Troca de tela):');
  if (item) { data.heroList.push(item); render(); }
}

function removeHeroItem(i) {
  data.heroList.splice(i, 1);
  render();
}

// === RENDER ===
function render() {
  var app = document.getElementById('app');
  var h = '';

  // === HERO LIST ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('list', 'icon-md') + ' Lista do Hero <span class="badge">' + data.heroList.length + ' itens</span></h2>';
  h += '<div class="section-body">';
  data.heroList.forEach(function(item, i) {
    h += '<div class="item-card">';
    h += '<div style="display:flex;align-items:center;gap:10px;">';
    h += '<input value="' + escHtml(item) + '" onchange="data.heroList[' + i + ']=this.value" style="flex:1;">';
    h += '<button class="btn-icon delete" onclick="removeHeroItem(' + i + ')">' + iconSvg('x') + '</button>';
    h += '</div></div>';
  });
  h += '<button class="btn-add" onclick="addHeroItem()">' + iconSvg('plus') + ' Adicionar item</button>';
  h += '</div></div>';

  // === ABOUT ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('edit', 'icon-md') + ' Sobre</h2>';
  h += '<div class="section-body">';
  h += '<div class="form-grid">';
  h += field('aboutYears', 'Anos (negrito)', data.aboutYears);
  h += field('aboutTagline', 'Tagline (abaixo dos anos)', data.aboutTagline);
  h += '</div>';
  h += field('aboutTitle', 'Título', data.aboutTitle);
  h += field('aboutText1', 'Texto 1', data.aboutText1, 'textarea');
  h += field('aboutText2', 'Texto 2', data.aboutText2, 'textarea');
  h += '</div></div>';

  // === CONTACT ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('pin', 'icon-md') + ' Contato</h2>';
  h += '<div class="section-body">';
  h += field('businessHours', 'Horário de funcionamento', data.businessHours);
  h += field('mapAddress', 'Endereço (destaque)', data.mapAddress);
  h += field('mapCity', 'Cidade', data.mapCity);
  h += field('mapRegion', 'Região', data.mapRegion);
  h += '</div></div>';

  // === SERVICES ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('phone', 'icon-md') + ' Serviços de Celular <span class="badge">' + data.services.length + ' itens</span></h2>';
  h += '<div class="section-body">';
  data.services.forEach(function(s, i) {
    h += '<div class="item-card">';
    h += '<div class="item-card-header">';
    h += '<div class="title">#' + (i+1) + ' — ' + escHtml(s.name) + '</div>';
    h += '<div class="actions">';
    if (i > 0) h += '<button class="btn-icon move" onclick="moveService(' + i + ',-1)">' + iconSvg('up') + '</button>';
    if (i < data.services.length-1) h += '<button class="btn-icon move" onclick="moveService(' + i + ',1)">' + iconSvg('down') + '</button>';
    h += '<button class="btn-icon delete" onclick="removeService(' + i + ')">' + iconSvg('x') + '</button>';
    h += '</div></div>';
    h += '<div class="form-row">';
    h += '<div class="field"><label>Ícone SVG</label><input value="' + escHtml(s.icon) + '" onchange="data.services[' + i + '].icon=this.value"></div>';
    h += '<div class="field"><label>Nome</label><input value="' + escHtml(s.name) + '" onchange="data.services[' + i + '].name=this.value"></div>';
    h += '</div>';
    h += '<div class="field"><label>Descrição</label><textarea rows="2" onchange="data.services[' + i + '].desc=this.value">' + escHtml(s.desc) + '</textarea></div>';
    h += '<div class="field"><label>Preço</label><input value="' + escHtml(s.price) + '" onchange="data.services[' + i + '].price=this.value"></div>';
    h += '</div>';
  });
  h += '<button class="btn-add" onclick="addService()">' + iconSvg('plus') + ' Adicionar serviço</button>';
  h += '</div></div>';

  // === SCOOTERS ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('scooter', 'icon-md') + ' Scooters <span class="badge">' + data.scooters.length + ' itens</span></h2>';
  h += '<div class="section-body">';
  data.scooters.forEach(function(s, i) {
    h += '<div class="item-card">';
    h += '<div class="item-card-header">';
    h += '<div class="title">#' + (i+1) + ' — ' + escHtml(s.name) + '</div>';
    h += '<div class="actions">';
    if (i > 0) h += '<button class="btn-icon move" onclick="moveScooter(' + i + ',-1)">' + iconSvg('up') + '</button>';
    if (i < data.scooters.length-1) h += '<button class="btn-icon move" onclick="moveScooter(' + i + ',1)">' + iconSvg('down') + '</button>';
    h += '<button class="btn-icon delete" onclick="removeScooter(' + i + ')">' + iconSvg('x') + '</button>';
    h += '</div></div>';
    h += '<div class="form-row">';
    h += '<div class="field"><label>Nome</label><input value="' + escHtml(s.name) + '" onchange="data.scooters[' + i + '].name=this.value"></div>';
    h += '<div class="field"><label>Tag</label><input value="' + escHtml(s.tag || '') + '" onchange="data.scooters[' + i + '].tag=this.value" placeholder="Ex: Mais vendida"></div>';
    h += '</div>';
    h += '<div class="field"><label>Cor de fundo (CSS gradient)</label><input value="' + escHtml(s.bg || '') + '" onchange="data.scooters[' + i + '].bg=this.value" placeholder="linear-gradient(...)"></div>';
    h += '<div class="field"><label>Descrição</label><textarea rows="2" onchange="data.scooters[' + i + '].desc=this.value">' + escHtml(s.desc) + '</textarea></div>';
    h += '<div class="field"><label>Preço</label><input value="' + escHtml(s.price) + '" onchange="data.scooters[' + i + '].price=this.value"></div>';

    // Specs
    h += '<div class="field"><label>Especificações</label><div class="specs-grid">';
    if (s.specLabels) {
      s.specLabels.forEach(function(label, si) {
        h += '<div class="spec-tag">' + escHtml(label) + ' <span class="remove-spec" onclick="removeSpec(' + i + ',' + si + ')">' + iconSvg('x', 'icon-sm') + '</span></div>';
      });
    }
    h += '</div><button class="btn-add" style="padding:8px;" onclick="addSpec(' + i + ')">' + iconSvg('plus') + ' Adicionar spec</button></div>';

    // Image
    h += '<div class="field"><label>Foto</label><div class="img-upload">';
    h += '<label class="upload-btn">' + iconSvg('image') + ' Escolher foto <input type="file" accept="image/*" onchange="handleImageUpload(' + i + ',this.files[0])"></label>';
    h += '<div class="img-preview">';
    if (s.image) {
      h += '<img src="' + s.image + '" alt=""><br></div>';
      h += '<span class="img-remove" onclick="removeImage(' + i + ')">Remover foto</span>';
    } else {
      h += '<span class="no-img">Sem foto</span></div>';
    }
    h += '</div></div>';
    h += '</div>';
  });
  h += '<button class="btn-add" onclick="addScooter()">' + iconSvg('plus') + ' Adicionar scooter</button>';
  h += '</div></div>';

  // === FEEDBACKS ===
  h += '<div class="section-card">';
  h += '<h2>' + iconSvg('star', 'icon-md') + ' Feedbacks <span class="badge">' + data.feedbacks.length + ' itens</span></h2>';
  h += '<div class="section-body">';
  data.feedbacks.forEach(function(f, i) {
    h += '<div class="item-card">';
    h += '<div class="item-card-header">';
    h += '<div class="title">#' + (i+1) + ' — ' + escHtml(f.name) + '</div>';
    h += '<div class="actions"><button class="btn-icon delete" onclick="removeFeedback(' + i + ')">' + iconSvg('x') + '</button></div>';
    h += '</div>';
    h += '<div class="form-row">';
    h += '<div class="field"><label>Nome</label><input value="' + escHtml(f.name) + '" onchange="data.feedbacks[' + i + '].name=this.value"></div>';
    h += '<div class="field"><label>Iniciais (avatar)</label><input value="' + escHtml(f.initials) + '" onchange="data.feedbacks[' + i + '].initials=this.value" maxlength="3"></div>';
    h += '</div>';
    h += '<div class="field"><label>Depoimento</label><textarea rows="2" onchange="data.feedbacks[' + i + '].text=this.value">' + escHtml(f.text) + '</textarea></div>';
    h += '</div>';
  });
  h += '<button class="btn-add" onclick="addFeedback()">' + iconSvg('plus') + ' Adicionar feedback</button>';
  h += '</div></div>';

  app.innerHTML = h;
}

function field(key, label, val, type) {
  type = type || 'input';
  var tag = type === 'textarea'
    ? '<textarea rows="2" onchange="data[\'' + key + '\']=this.value">' + escHtml(val) + '</textarea>'
    : '<input value="' + escHtml(val) + '" onchange="data[\'' + key + '\']=this.value">';
  return '<div class="field"><label>' + label + '</label>' + tag + '</div>';
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveAll();
  }
});

// ===== LOGIN / LOGOUT =====
function isLoggedIn() {
  return sessionStorage.getItem('rr_admin_logged') === 'true';
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
}

function hideLogin() {
  document.getElementById('loginScreen').style.display = 'none';
}

function doLogin() {
  var user = document.getElementById('loginUser').value;
  var pass = document.getElementById('loginPass').value;
  if (user === 'CRISTIAN123' && pass === '123456') {
    sessionStorage.setItem('rr_admin_logged', 'true');
    hideLogin();
    document.getElementById('loginError').classList.remove('show');
  } else {
    document.getElementById('loginError').classList.add('show');
  }
}

function doLogout() {
  sessionStorage.removeItem('rr_admin_logged');
  showLogin();
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').classList.remove('show');
}

if (!isLoggedIn()) {
  showLogin();
} else {
  hideLogin();
}

loadData();
render();
</script>
